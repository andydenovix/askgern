<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ask Gern — DeNovix Knowledge Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --dn-navy:    #1a2b4a;
      --dn-blue:    #0066cc;
      --dn-light:   #e8f0fb;
      --dn-teal:    #00a0b0;
      --dn-grey:    #f4f6f9;
      --dn-border:  #d0d8e8;
      --dn-text:    #1a2b4a;
      --dn-muted:   #6b7a99;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--dn-grey);
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--dn-text);
    }

    /* ── Background grid pattern — subtle lab graph paper feel ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,102,204,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,102,204,.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse at 80% 0%, rgba(0,160,176,.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 20% 100%, rgba(0,102,204,.06) 0%, transparent 50%);
    }

    /* ── Header bar ── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 52px;
      background: var(--dn-navy);
      display: flex; align-items: center;
      padding: 0 24px;
      gap: 12px;
      border-bottom: 2px solid var(--dn-blue);
    }

    .site-header .denovix-wordmark {
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: white;
      letter-spacing: .04em;
      text-decoration: none;
    }

    .site-header .divider {
      width: 1px; height: 18px;
      background: rgba(255,255,255,.25);
    }

    .site-header .product-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,.65);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* ── Main layout ── */
    .main {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 16px 24px;
    }

    .card {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* ── Gern avatar ── */
    .gern-avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      animation: fadeUp .5s ease both;
    }

    .gern-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--dn-blue), var(--dn-teal));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,102,204,.3);
      position: relative;
    }

    /* Subtle pulse ring */
    .gern-avatar::before {
      content: '';
      position: absolute; inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(0,102,204,.2);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.06); opacity: .5; }
    }

    .gern-monogram {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: white;
      letter-spacing: -.02em;
      user-select: none;
    }

    .gern-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--dn-navy);
      letter-spacing: -.01em;
    }

    .gern-subtitle {
      font-size: 13px;
      color: var(--dn-muted);
      letter-spacing: .02em;
    }

    /* ── Chat bubble ── */
    .chat-bubble {
      width: 100%;
      background: white;
      border: 1px solid var(--dn-border);
      border-radius: 12px;
      border-top-left-radius: 3px;
      box-shadow: 0 2px 16px rgba(26,43,74,.08), 0 1px 4px rgba(26,43,74,.04);
      padding: 20px 22px;
      position: relative;
      animation: fadeUp .5s .1s ease both;
      transition: opacity .2s;
    }

    /* Notch top-left */
    .chat-bubble::before {
      content: '';
      position: absolute;
      top: 0; left: -10px;
      width: 20px; height: 20px;
      background: white;
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      border-left: 1px solid var(--dn-border);
      border-bottom: 1px solid var(--dn-border);
      clip-path: polygon(100% 0%, 100% 0%, 100% 100%);
      background: white;
    }

    /* Markdown styling */
    .md-content { font-size: 14px; line-height: 1.7; color: var(--dn-text); }
    .md-content p { margin-bottom: .6em; }
    .md-content p:last-child { margin-bottom: 0; }
    .md-content strong { font-weight: 600; color: var(--dn-navy); }
    .md-content ul, .md-content ol { margin: .4em 0 .4em 1.4em; }
    .md-content li { margin-bottom: .25em; }
    .md-content code { background: var(--dn-light); color: var(--dn-navy); padding: .1em .35em; border-radius: 4px; font-size: .85em; font-family: monospace; }
    .md-content pre { background: var(--dn-light); border-radius: 6px; padding: .8em 1em; overflow-x: auto; margin: .5em 0; }
    .md-content pre code { background: transparent; padding: 0; }
    .md-content a { color: var(--dn-blue); text-decoration: underline; }
    .md-content h3 { font-family: 'Montserrat', sans-serif; font-size: .95em; font-weight: 600; margin: .8em 0 .3em; color: var(--dn-navy); }

    /* Source chip */
    .source-chip {
      display: inline-block;
      margin-top: 10px;
      background: var(--dn-light);
      color: var(--dn-blue);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(0,102,204,.2);
    }

    /* ── Loading indicator ── */
    .loading {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 0;
    }
    .loading-dots {
      display: flex; gap: 4px;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--dn-blue);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes dotPulse {
      0%,80%,100% { transform: scale(.6); opacity: .3; }
      40%          { transform: scale(1); opacity: 1; }
    }
    .loading-text {
      font-size: 13px;
      color: var(--dn-muted);
      font-style: italic;
    }

    /* ── Input area ── */
    .input-wrap {
      width: 100%;
      background: white;
      border: 1.5px solid var(--dn-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 6px 6px 6px 14px;
      gap: 8px;
      transition: border-color .2s, box-shadow .2s;
      animation: fadeUp .5s .2s ease both;
      box-shadow: 0 1px 6px rgba(26,43,74,.06);
    }
    .input-wrap:focus-within {
      border-color: var(--dn-blue);
      box-shadow: 0 0 0 3px rgba(0,102,204,.1);
    }
    .input-wrap input {
      flex: 1;
      border: none; outline: none;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 14px;
      color: var(--dn-text);
      background: transparent;
      padding: 6px 0;
    }
    .input-wrap input::placeholder { color: #a0aab8; }

    .send-btn {
      background: var(--dn-blue);
      color: white;
      border: none;
      border-radius: 7px;
      padding: 8px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: .03em;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .send-btn:hover  { background: #0052aa; }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { background: #a0b4cc; cursor: not-allowed; }

    /* ── Suggested questions ── */
    .suggestions {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      animation: fadeUp .5s .3s ease both;
    }
    .suggestion {
      background: white;
      border: 1px solid var(--dn-border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--dn-blue);
      cursor: pointer;
      transition: all .15s;
      font-weight: 500;
    }
    .suggestion:hover {
      background: var(--dn-light);
      border-color: var(--dn-blue);
    }

    /* ── Powered by bar ── */
    .powered-by {
      font-size: 11px;
      color: var(--dn-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      animation: fadeUp .5s .4s ease both;
    }
    .powered-by::before,
    .powered-by::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--dn-border);
    }

    /* ── Video embed ── */
    .video-embed {
      margin-top: .8em;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border: 1px solid var(--dn-border);
    }
    .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--dn-border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Header -->
<header class="site-header">
  <a href="https://www.denovix.com" target="_blank" class="denovix-wordmark">DeNovix</a>
  <div class="divider"></div>
  <span class="product-label">Ask Gern</span>
</header>

<!-- Main -->
<main class="main">
  <div class="card">

    <!-- Avatar -->
    <div class="gern-avatar-wrap">
      <div class="gern-avatar">
        <span class="gern-monogram">G</span>
      </div>
      <div class="gern-title">Ask Gern</div>
      <div class="gern-subtitle">DeNovix Knowledge Assistant</div>
    </div>

    <!-- Chat bubble -->
    <div class="chat-bubble" id="chatBubble">
      <div class="md-content" id="responseArea">
        <p>Hello! I'm Gern, your DeNovix knowledge assistant. I can help with questions about our instruments, applications, protocols and specifications. How can I help you today?</p>
      </div>
    </div>

    <!-- Loading -->
    <div id="loadingEl" class="loading" style="display:none;">
      <div class="loading-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span class="loading-text">Looking that up…</span>
    </div>

    <!-- Suggestions -->
    <div class="suggestions" id="suggestions">
      <button class="suggestion" onclick="askSuggestion(this)">What is the DS-11 Series?</button>
      <button class="suggestion" onclick="askSuggestion(this)">How does CellDrop work?</button>
      <button class="suggestion" onclick="askSuggestion(this)">Which instrument measures fluorescence?</button>
      <button class="suggestion" onclick="askSuggestion(this)">What assays does DeNovix offer?</button>
    </div>

    <!-- Input -->
    <div class="input-wrap">
      <input
        id="userInput"
        type="text"
        maxlength="600"
        placeholder="Ask a question about DeNovix products…"
        autocomplete="off"
      />
      <button id="sendBtn" class="send-btn">Ask</button>
    </div>

    <!-- Powered by -->
    <div class="powered-by">Powered by Claude · denovix.com</div>

  </div>
</main>

<script>
  const responseArea = document.getElementById('responseArea');
  const chatBubble   = document.getElementById('chatBubble');
  const loadingEl    = document.getElementById('loadingEl');
  const sendBtn      = document.getElementById('sendBtn');
  const suggestions  = document.getElementById('suggestions');

  function extractVideoEmbeds(text) {
    const videos = [];
    const ytRe = /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})[^\s)]*/g;
    text = text.replace(ytRe, (match, id) => {
      videos.push(`<div class="video-embed"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`);
      return '[video below]';
    });
    const vimeoRe = /https?:\/\/(?:www\.)?vimeo\.com\/(\d+)[^\s)]*/g;
    text = text.replace(vimeoRe, (match, id) => {
      videos.push(`<div class="video-embed"><iframe src="https://player.vimeo.com/video/${id}" allowfullscreen loading="lazy"></iframe></div>`);
      return '[video below]';
    });
    return { text, videos };
  }

  function showResponse(text) {
    loadingEl.style.display = 'none';
    chatBubble.style.opacity = '1';
    const { text: cleanText, videos } = extractVideoEmbeds(text);
    const parsed = marked.parse(cleanText, { breaks: true, gfm: true });
    responseArea.innerHTML = `<div class="md-content">${parsed}${videos.join('')}</div>`;
  }

  function setLoading(on) {
    loadingEl.style.display = on ? 'flex' : 'none';
    chatBubble.style.opacity = on ? '0.4' : '1';
    sendBtn.disabled = on;
    suggestions.style.display = on ? 'none' : 'flex';
  }

  async function askGern(query) {
    setLoading(true);
    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`);
      showResponse(data.reply);
    } catch (err) {
      showResponse(`**Something went wrong.** ${err.message}\n\nPlease try again in a moment.`);
      setLoading(false);
    }
  }

  function handleSend() {
    const q = document.getElementById('userInput').value.trim();
    if (!q) return;
    document.getElementById('userInput').value = '';
    askGern(q);
  }

  function askSuggestion(el) {
    document.getElementById('userInput').value = el.textContent;
    handleSend();
  }

  sendBtn.addEventListener('click', handleSend);
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) handleSend();
  });

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('[SW] Registered'))
        .catch(err => console.warn('[SW] Registration failed:', err));
    });
  }
</script>
</body>
</html>
