<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Ask Gern — DeNovix Knowledge Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --dn-navy:   #1a2b4a;
      --dn-blue:   #0066cc;
      --dn-light:  #e8f0fb;
      --dn-teal:   #00a0b0;
      --dn-grey:   #f4f6f9;
      --dn-border: #d0d8e8;
      --dn-text:   #1a2b4a;
      --dn-muted:  #6b7a99;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; height: 100dvh; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--dn-grey);
      height: calc(var(--vh, 1vh) * 100);
      height: 100dvh; /* dynamic viewport — fixes iOS browser chrome */
      display: flex;
      flex-direction: column;
      color: var(--dn-text);
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,102,204,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,102,204,.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Header ── */
    .site-header {
      position: relative; z-index: 10;
      height: 52px;
      background: var(--dn-navy);
      display: flex; align-items: center;
      padding: 0 16px;
      gap: 10px;
      border-bottom: 2px solid var(--dn-blue);
      flex-shrink: 0;
    }
    .site-header a {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px; font-weight: 700;
      color: white; text-decoration: none; letter-spacing: .04em;
    }
    .site-header .div { width: 1px; height: 18px; background: rgba(255,255,255,.25); }
    .site-header .label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,.6); letter-spacing: .1em; text-transform: uppercase;
    }
    .clear-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid rgba(255,255,255,.25);
      color: rgba(255,255,255,.6);
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; letter-spacing: .06em;
      padding: 5px 12px; border-radius: 4px; cursor: pointer;
      transition: all .15s;
    }
    .clear-btn:hover { border-color: rgba(255,255,255,.5); color: white; }

    /* ── Gern intro header ── */
    .gern-header {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px 10px;
      flex-shrink: 0;
      max-width: 680px; width: 100%; margin: 0 auto;
      background: var(--dn-grey);
    }
    .gern-header img {
      width: 56px; height: auto;
      filter: drop-shadow(0 2px 8px rgba(0,102,204,.2));
      flex-shrink: 0;
    }
    .gern-header-text h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 16px; font-weight: 700;
      color: var(--dn-navy); letter-spacing: -.01em;
    }
    .gern-header-text p {
      font-size: 12px; color: var(--dn-muted); margin-top: 1px;
    }

    /* ── Chat thread ── */
    .chat-thread {
      position: relative; z-index: 1;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 16px 16px;
      max-width: 680px; width: 100%; margin: 0 auto;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .chat-thread::-webkit-scrollbar { width: 4px; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--dn-border); border-radius: 4px; }

    /* ── Message bubbles ── */
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px; line-height: 1.65;
    }
    .msg.gern .bubble {
      background: white;
      border: 1px solid var(--dn-border);
      border-top-left-radius: 3px;
      color: var(--dn-text);
      box-shadow: 0 1px 6px rgba(26,43,74,.06);
    }
    .msg.user .bubble {
      background: var(--dn-blue);
      color: white;
      border-top-right-radius: 3px;
    }

    /* Markdown inside Gern bubbles */
    .bubble p { margin-bottom: .5em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 600; }
    .bubble ul, .bubble ol { margin: .3em 0 .3em 1.3em; }
    .bubble li { margin-bottom: .2em; }
    .bubble code { background: var(--dn-light); color: var(--dn-navy); padding: .1em .3em; border-radius: 3px; font-size: .85em; font-family: monospace; }
    .bubble pre { background: var(--dn-light); border-radius: 6px; padding: .7em 1em; overflow-x: auto; margin: .4em 0; }
    .bubble pre code { background: transparent; padding: 0; }
    .bubble a { color: var(--dn-blue); }
    .bubble h3 { font-family: 'Montserrat', sans-serif; font-size: .9em; font-weight: 600; margin: .6em 0 .2em; color: var(--dn-navy); }

    /* Gern avatar in thread */
    .thread-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--dn-navy);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .thread-avatar img { width: 32px; height: auto; }

    /* Loading dots */
    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--dn-blue);
      animation: dot 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes dot {
      0%,80%,100% { transform: scale(.55); opacity: .3; }
      40%          { transform: scale(1); opacity: 1; }
    }

    /* Video embed */
    .video-embed { margin-top: .6em; border-radius: 8px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; border: 1px solid var(--dn-border); }
    .video-embed iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }

    /* ── Suggestions ── */
    .suggestions {
      position: relative; z-index: 1;
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 0 16px 10px;
      max-width: 680px; width: 100%; margin: 0 auto;
      flex-shrink: 0;
    }
    .suggestion {
      background: white;
      border: 1px solid var(--dn-border);
      border-radius: 16px;
      padding: 5px 13px;
      font-size: 12px; color: var(--dn-blue);
      cursor: pointer; transition: all .15s; font-weight: 500;
    }
    .suggestion:hover { background: var(--dn-light); border-color: var(--dn-blue); }

    /* ── Input bar ── */
    .input-bar {
      position: relative; z-index: 1;
      padding: 10px 16px 14px;
      max-width: 680px; width: 100%; margin: 0 auto;
      flex-shrink: 0;
      background: var(--dn-grey);
    }
    .input-wrap {
      background: white;
      border: 1.5px solid var(--dn-border);
      border-radius: 10px;
      display: flex; align-items: center;
      padding: 6px 6px 6px 14px; gap: 8px;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 1px 6px rgba(26,43,74,.06);
    }
    .input-wrap:focus-within {
      border-color: var(--dn-blue);
      box-shadow: 0 0 0 3px rgba(0,102,204,.1);
    }
    .input-wrap input {
      flex: 1; border: none; outline: none;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 14px; color: var(--dn-text);
      background: transparent; padding: 6px 0;
    }
    .input-wrap input::placeholder { color: #a0aab8; }
    .send-btn {
      background: var(--dn-blue); color: white;
      border: none; border-radius: 7px;
      padding: 8px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; letter-spacing: .03em;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .send-btn:hover { background: #0052aa; }
    .send-btn:active { transform: scale(.97); }
    .send-btn:disabled { background: #a0b4cc; cursor: not-allowed; }

    .powered-by {
      text-align: center;
      font-size: 11px; color: var(--dn-muted);
      padding-bottom: 6px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg { animation: fadeUp .25s ease both; }
  </style>
</head>

  <button class="clear-btn" id="clearBtn">New conversation</button>
</header>

function extractVideos(text) {
  const videos = [];
  const ytRe = /https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})[^\s)]*/g;
  text = text.replace(ytRe, (_, id) => { videos.push(`<div class="video-embed"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`); return '[video below]'; });
  const vimRe = /https?:\/\/(?:www\.)?vimeo\.com\/(\d+)[^\s)]*/g;

  return { text, videos };
}

function addUserMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'msg user';
  msg.innerHTML = `<div class="bubble">${text.replace(/</g,'&lt;')}</div>`;
  thread.appendChild(msg);
  thread.scrollTop = thread.scrollHeight;
}

async function send(query) {
  suggestions.style.display = 'none';
  addUserMessage(query);
  history.push({ role: 'user', content: query });

  sendBtn.disabled = true;
  const typingEl = addTyping();

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, history: history.slice(-10) }) // send last 10 turns
    });
    const data = await res.json();
    typingEl.remove();
    if (!res.ok || data.error) throw new Error(data.error || 'Server error');
    const reply = data.reply;
    history.push({ role: 'assistant', content: reply });
    addGernMessage(reply);
  } catch(err) {
    typingEl.remove();
    addGernMessage('Sorry, something went wrong. Please try again in a moment.');
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

function handleSend() {
  const q = userInput.value.trim();
  if (!q) return;
  userInput.value = '';
  send(q);
}

function askSuggestion(el) {
  userInput.value = el.textContent;
  handleSend();
}

document.getElementById('clearBtn').addEventListener('click', () => {
  history = [];
  thread.innerHTML = '';
  suggestions.style.display = 'flex';
  addGernMessage("Hello! I'm Gern, your DeNovix knowledge assistant. How can I help you today?");
});

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
